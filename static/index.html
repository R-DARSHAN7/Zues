<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA - AI Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="blob-cont">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
        <div class="blob blob3"></div>
    </div>

    <div class="glass-container">
        <header>
            <div class="brand">
                <h1>NOVA</h1>
                <span class="status-indicator"></span>
            </div>
            <div class="profile-selector">
                <select id="profile-select">
                    <option value="dad">Dad</option>
                    <option value="mom">Mom</option>
                    <option value="kids">Kids</option>
                </select>
            </div>
        </header>

        <main class="chat-interface">
            <div id="chat-history" class="chat-history"></div>
            <div id="typing-indicator" class="msg bot typing-wrapper hidden">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </main>

        <div class="controls">
            <div class="visualizer" id="audio-visualizer">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>

            <button id="mic-btn" class="mic-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M12 2C10.34 2 9 3.34 9 5V11C9 12.66 10.34 14 12 14C13.66 14 15 12.66 15 11V5C15 3.34 13.66 2 12 2ZM19 11C19 14.87 15.87 18 12 18C8.13 18 5 14.87 5 11H3C3 15.53 6.39 19.26 10.75 19.86V23H13.25V19.86C17.61 19.26 21 15.53 21 11H19Z"
                        fill="white" />
                </svg>
            </button>
            <p id="status-text">System Ready. Click mic to begin.</p>
        </div>
    </div>
    <audio id="tts-audio" style="display:none;"></audio>
    <script src="/static/app.js"></script>
</body>

</html>
